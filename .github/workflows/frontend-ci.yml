name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-build-test-lint:
    name: Install, Build, Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: |
          if npm run | grep -q "^  test"; then
            npm run test
          else
            echo "::warning::No 'test' script found in package.json. Unit Tests gate is NOT enforced until one is added (e.g. Vitest + 'npm run test')."
          fi

      - name: Build
        run: npm run build

      - name: Verify build artifact
        run: |
          if [ -d "dist" ]; then
            echo "Build successful"
            ls -lh dist
          else
            echo "Build failed — dist/ directory not found"
            exit 1
          fi
